name: Merge All Contributors

on:
  workflow_call:
  workflow_dispatch:

jobs:
  merge-contributors:
    runs-on: ubuntu-latest
    permissions:
       contents: write
       pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: 'main'

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: the-turing-way/all-all-contributors@refactor/local-git-operations
        with:
          organisation: sgibson91-test-org
          target_repo: .github
          github_token: ${{ secrets.GITHUB_TOKEN }}

