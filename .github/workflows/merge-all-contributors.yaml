name: Merge All Contributors

on:
  push:
    paths:
      - ".all-contributorsrc"
  workflow_call:
  workflow_dispatch:

jobs:
  merge-contributors:
    runs-on: ubuntu-latest
    permissions:
       contents: write
       pull-requests: write
    steps:
      - uses: the-turing-way/all-all-contributors@main
        with:
          organisation: sgibson91-test-org
          target_repo: .github
          github_token: ${{ secrets.GITHUB_TOKEN }}

